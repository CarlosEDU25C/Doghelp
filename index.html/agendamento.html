<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DogHelp · Agendar banho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar__interno">
    <div class="marca">
      <span class="azul">Dog</span><span class="vermelho">Help</span>
    </div>
    <nav class="nav-principal">
      <a href="dashboard.html">Dashboard</a>
      <a href="pets.html">Meus Pets</a>
      <a href="agendamento.html" class="ativo">Agendar</a>
      <a href="historico.html">Histórico</a>
    </nav>
    <div class="topbar__usuario">
      <span>Olá, <strong id="nomeUsuario">...</strong></span>
      <button class="btn-sair" id="btnSair">Sair</button>
    </div>
  </div>
</header>

<main class="pagina">
  <header class="cabecalho-pagina">
    <div>
      <h1><span class="titulo-destaque">Agendar banho</span></h1>
      <span class="descricao">Selecione o pet, dia e horário.</span>
    </div>
  </header>

  <div class="bloco">
    <div class="bloco__titulo">
      <h2>Escolha o pet</h2>
    </div>
    <div class="campo" style="max-width:400px;">
      <label for="selectPet">Pet</label>
      <select id="selectPet">
        <option value="">Selecione um pet</option>
      </select>
    </div>
  </div>

  <div class="bloco" id="blocoHorarios" style="display:none;">
    <div class="bloco__titulo">
      <h2>Selecione o horário</h2>
    </div>
    <span class="bloco__subtitulo">Clique no horário desejado para agendar.</span>

    <div class="tabela-horarios-wrap">
      <table class="tabela-horarios">
        <thead>
          <tr>
            <th>Horário</th>
            <th>Seg</th>
            <th>Ter</th>
            <th>Qua</th>
            <th>Qui</th>
            <th>Sex</th>
            <th>Sáb</th>
          </tr>
        </thead>
        <tbody id="corpoHorarios">
        </tbody>
      </table>
    </div>

    <div class="resumo-selecao" id="resumoSelecao">
      <strong id="resumoTexto">Nenhum horário selecionado</strong>
    </div>
  </div>

  <div class="bloco" id="blocoObservacoes" style="display:none;">
    <div class="bloco__titulo">
      <h2>Observações</h2>
    </div>
    <div class="campo">
      <label for="obsBanho">Informações adicionais</label>
      <textarea id="obsBanho" placeholder="Ex: pelagem ressecada, usar shampoo hipoalergênico..."></textarea>
    </div>
    <button class="btn btn-blue" id="btnConfirmarBanho">Confirmar agendamento</button>
  </div>
</main>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/agendamento.js"></script>
</body>
</html>
