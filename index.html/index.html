<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DogHelp · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="tela-auth">
  <!-- Painel esquerdo -->
  <div class="painel-marca">
    <div class="painel-marca__conteudo">
      <div class="marca">
        <span class="azul">Dog</span><span class="vermelho">Help</span>
      </div>
      <h1>
        Cuidado<br>
        <span class="azul">inteligente</span><br>
        para seu pet
      </h1>
      <p>Gerencie banhos, saúde, agendamentos e histórico de atendimentos em um só lugar.</p>
    </div>
  </div>

  <!-- Painel direito -->
  <div class="painel-form">
    <div class="cartao-form">

      <!-- LOGIN -->
      <div id="loginForm">
        <span class="label-topo">Acesso</span>
        <h2>Entrar</h2>
        <span class="subtitulo">Acesse sua conta para gerenciar seus pets.</span>

        <div id="alertaLogin" class="alerta"></div>

        <div class="campo">
          <label for="loginEmail">E-mail</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        <div class="campo">
          <label for="loginSenha">Senha</label>
          <input type="password" id="loginSenha" placeholder="••••••••">
        </div>

        <button class="btn btn-blue" id="btnLogin">Entrar</button>

        <div class="rodape-form">
          Não tem conta? <a href="#" id="irCadastro">Cadastre-se</a>
        </div>
      </div>

      <!-- CADASTRO -->
      <div id="cadastroForm" class="oculto">
        <span class="label-topo">Novo registro</span>
        <h2>Criar conta</h2>
        <span class="subtitulo">Preencha os dados para começar.</span>

        <div id="alertaCadastro" class="alerta"></div>

        <div class="campo">
          <label for="cadNome">Nome completo *</label>
          <input type="text" id="cadNome" placeholder="Seu nome">
        </div>
        <div class="campo">
          <label for="cadEmail">E-mail *</label>
          <input type="email" id="cadEmail" placeholder="seu@email.com">
        </div>
        <div class="campo">
          <label for="cadSenha">Senha *</label>
          <input type="password" id="cadSenha" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="campo">
          <label for="cadTelefone">Telefone</label>
          <input type="text" id="cadTelefone" placeholder="(00) 00000-0000">
        </div>
        <div class="campo">
          <label for="cadEndereco">Endereço</label>
          <input type="text" id="cadEndereco" placeholder="Rua, número, bairro, cidade">
        </div>

        <button class="btn btn-blue" id="btnCadastrar">Cadastrar</button>

        <div class="rodape-form">
          Já tem conta? <a href="#" id="irLogin">Faça login</a>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
