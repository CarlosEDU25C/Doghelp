<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DogHelp · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar__interno">
    <div class="marca">
      <span class="azul">Dog</span><span class="vermelho">Help</span>
    </div>
    <nav class="nav-principal">
      <a href="dashboard.html" class="ativo">Dashboard</a>
      <a href="pets.html">Meus Pets</a>
      <a href="agendamento.html">Agendar</a>
      <a href="historico.html">Histórico</a>
    </nav>
    <div class="topbar__usuario">
      <span>Olá, <strong id="nomeUsuario">...</strong></span>
      <button class="btn-sair" id="btnSair">Sair</button>
    </div>
  </div>
</header>

<main class="pagina">
  <header class="cabecalho-pagina">
    <div>
      <h1><span class="titulo-destaque">Dashboard</span></h1>
      <span class="descricao">Resumo dos seus pets e agendamentos.</span>
    </div>
  </header>

  <section class="grade-resumo">
    <div class="cartao-resumo">
      <span class="rotulo">Pets cadastrados</span>
      <span class="valor azul" id="totalPets">0</span>
      <span class="legenda">animais sob seus cuidados</span>
    </div>
    <div class="cartao-resumo">
      <span class="rotulo">Próximos banhos</span>
      <span class="valor vermelho" id="proximosBanhos">0</span>
      <span class="legenda">agendados para esta semana</span>
    </div>
    <div class="cartao-resumo">
      <span class="rotulo">Último banho</span>
      <span class="valor" id="ultimoBanho" style="font-size:1.1rem;font-weight:400;color:var(--text-secondary);">—</span>
      <span class="legenda">mais recente registrado</span>
    </div>
  </section>

  <section class="bloco">
    <div class="bloco__titulo">
      <h2>Seus pets</h2>
    </div>
    <span class="bloco__subtitulo">Últimos 4 pets cadastrados</span>
    <div class="grade-fichas" id="listaPetsDashboard">
    </div>
  </section>
</main>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
